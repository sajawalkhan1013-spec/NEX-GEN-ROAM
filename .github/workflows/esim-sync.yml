name: Automated eSIM Rates Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Hum ne yahan se npm install hata diya hai agar dependencies nahi chahiye thin

       Sirf script run karne ke liye:
      - name: Run eSIM Automation Script
        env:
          GOOGLE_SHEET_API_KEY: ${{ secrets.GOOGLE_SHEET_API_KEY }}
        run: |
          node scripts/sync-esim-rates.js

      - name: Commit and Push Updated Rates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff-index --quiet HEAD || git commit -m "chore: Auto-updated eSIM rates"
          git push
