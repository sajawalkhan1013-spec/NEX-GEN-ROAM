name: Automated eSIM Rates Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run eSIM Automation Script
        run: |
          # Yeh command aap ke pure project mein jahan bhi .js file hogi, usay dhoond kar khud chala degi
          find . -name "*.js" ! -path "*/node_modules/*" -exec node {} \;

      - name: Commit and Push Updated Rates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff-index --quiet HEAD || git commit -m "chore: Auto-updated eSIM rates"
          git push
