name: Automated eSIM Rates Sync

on:
  schedule:
    - cron: '0 0 * * *' # Roz raat ke 12 baje script khud chalegi
  workflow_dispatch: # Taake aap GitHub dashboard se manually bhi 'Run' kar sakein

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Setup Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm install
        npx playwright install chromium

    - name: Execute Scraper
      run: node scraper.js

    - name: Push updated rates to repository
      run: |
        git config --global user.name "NexGenRoam Automation"
        git config --global user.email "automation@nexgenroam.com"
        git add src/lib/rates.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Sync: MobiMatter Rates Updated" && git push)